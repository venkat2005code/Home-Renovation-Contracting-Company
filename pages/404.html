<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Under Construction | BuildPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#2563eb', secondary: '#f97316' } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<text y='50' font-size='50'>🔨</text>
</svg>">
</head>
<body class="bg-gradient-to-br from-blue-50 to-orange-50 dark:from-slate-900 dark:to-slate-800 min-h-screen flex items-center justify-center p-4">
    
    <div class="text-center max-w-2xl">
        <!-- Construction Icon Animation -->
        <div class="mb-8 animate-bounce">
            <i class="fas fa-hard-hat text-8xl text-orange-500"></i>
        </div>
        
        <!-- 404 Text -->
        <h1 class="text-8xl md:text-9xl font-bold bg-gradient-to-r from-blue-600 to-orange-500 bg-clip-text text-transparent mb-4">
            404
        </h1>
        
        <h2 class="text-3xl md:text-4xl font-bold mb-4">Page Under Construction</h2>
        
        <p class="text-xl text-gray-600 dark:text-gray-400 mb-8">
            Oops! The page you're looking for is currently under construction. 
            Our team is working hard to build it.
        </p>
        
        <!-- Construction Progress Bar -->
        <div class="mb-8">
            <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400 mb-2">
                <span>Construction Progress</span>
                <span>75%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-bar-fill" style="width: 75%"></div>
            </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="flex flex-wrap justify-center gap-4">
            <a href="../index.html" class="btn-primary text-lg px-8 py-4">
                <i class="fas fa-home mr-2"></i>Go to Homepage
            </a>
            <a href="contact.html" class="btn-outline text-lg px-8 py-4">
                <i class="fas fa-envelope mr-2"></i>Contact Support
            </a>
        </div>
        
        <!-- Helpful Links -->
        <div class="mt-12 grid grid-cols-2 md:grid-cols-4 gap-4">
            <a href="services.html" class="p-4 bg-white dark:bg-slate-800 rounded-lg shadow hover:shadow-lg transition">
                <i class="fas fa-tools text-2xl text-blue-600 mb-2"></i>
                <p class="text-sm font-semibold">Our Services</p>
            </a>
            <a href="pricing.html" class="p-4 bg-white dark:bg-slate-800 rounded-lg shadow hover:shadow-lg transition">
                <i class="fas fa-dollar-sign text-2xl text-green-600 mb-2"></i>
                <p class="text-sm font-semibold">Pricing</p>
            </a>
            <a href="blog.html" class="p-4 bg-white dark:bg-slate-800 rounded-lg shadow hover:shadow-lg transition">
                <i class="fas fa-newspaper text-2xl text-orange-600 mb-2"></i>
                <p class="text-sm font-semibold">Blog</p>
            </a>
            <a href="about.html" class="p-4 bg-white dark:bg-slate-800 rounded-lg shadow hover:shadow-lg transition">
                <i class="fas fa-info-circle text-2xl text-purple-600 mb-2"></i>
                <p class="text-sm font-semibold">About Us</p>
            </a>
        </div>
        
        <!-- Back to Home Link -->
        <div class="mt-8">
            <a href="../index.html" class="text-gray-600 dark:text-gray-400 hover:text-blue-600 transition">
                <i class="fas fa-arrow-left mr-2"></i>Back to Safety
            </a>
        </div>
    </div>
    
    <script src="../assets/js/main.js"></script>
</body>
</html>
